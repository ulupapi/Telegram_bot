<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Моё расписание</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div>
          <h1>Мой график</h1>
          <p id="userLine" class="muted">Загрузка профиля...</p>
        </div>
      </header>

      <nav class="tabs" id="tabs">
        <button class="tab active" data-tab="schedule">Моё расписание</button>
        <button class="tab" data-tab="history">Моя история</button>
      </nav>

      <main>
        <section class="screen active" id="screen-schedule">
          <div class="card">
            <h2>Добавить интервал</h2>
            <form id="scheduleForm" class="form-grid">
              <label>
                Дата
                <input type="date" id="scheduleDate" required />
              </label>
              <label>
                Начало
                <input type="time" id="scheduleStart" required />
              </label>
              <label>
                Окончание
                <input type="time" id="scheduleEnd" required />
              </label>
              <button class="btn btn-primary" type="submit">Сохранить расписание</button>
            </form>
          </div>

          <div class="card">
            <h2>Мои интервалы</h2>
            <div id="scheduleList" class="list"></div>
          </div>
        </section>

        <section class="screen" id="screen-history">
          <div class="card">
            <h2>История смен</h2>
            <div id="historyList" class="list"></div>
          </div>
        </section>
      </main>

      <div class="toast" id="toast"></div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
